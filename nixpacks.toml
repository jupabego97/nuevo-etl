[phases.setup]
nixPkgs = ["python312"]

[phases.install]
cmds = [
  "python -m venv --copies /opt/venv && . /opt/venv/bin/activate && pip install --upgrade pip setuptools wheel && pip install -r requirements.txt && pip install -e ."
]

[start]
cmd = "PYTHONPATH=/app/src uvicorn alegra_etl.web.app:create_app --factory --host 0.0.0.0 --port $PORT"

[variables]
PYTHONPATH = "/app/src"
NIXPACKS_PATH = "/opt/venv/bin:$NIXPACKS_PATH"
